<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterisk* | Cloud Sync</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <style>
        :root {
            --bg-sidebar: #010409; --bg-main: #0d1117; --bg-header: #161b22;
            --text-main: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
            --border: #30363d; --success: #3fb950; --danger: #f85149;
        }

        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-main); color: var(--text-main); overflow: hidden; }
        
        #sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; color: var(--accent); font-size: 1.2rem; }
        #note-list { flex: 1; overflow-y: auto; padding: 10px; }
        .note-item { padding: 12px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; font-size: 14px; }
        .note-item.active { background: #21262d; border-left: 4px solid var(--accent); }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { background: var(--bg-header); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        /* Renameable Title */
        #current-filename { 
            background: transparent; color: white; border: 1px solid transparent; 
            font-size: 16px; font-weight: 500; padding: 4px 8px; border-radius: 4px; outline: none;
        }
        #current-filename:hover, #current-filename:focus { border-color: var(--border); background: var(--bg-main); }

        .controls { display: flex; gap: 10px; align-items: center; }
        button { background: #21262d; color: var(--text-main); border: 1px solid var(--border); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        
        .editor-container { display: flex; flex: 1; overflow: hidden; }
        #editor, #preview { flex: 1; padding: 35px; overflow-y: auto; background: var(--bg-main); outline: none; border: none; color: var(--text-main); line-height: 1.6; font-size: 15px; }
        #editor { font-family: 'Fira Code', monospace; border-right: 1px solid var(--border); resize: none; }
        
        #status-bar { position: absolute; bottom: 20px; right: 20px; font-size: 11px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; color: var(--text-dim); }
        
        #preview h1 { border-bottom: 1px solid var(--border); }
        #preview code { background: rgba(110, 118, 129, 0.4); padding: 2px 4px; border-radius: 6px; }
        #preview pre { background: var(--bg-header); padding: 16px; border-radius: 8px; border: 1px solid var(--border); overflow: auto; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header"><span class="logo">Asterisk*</span><button onclick="createNewNote()">+</button></div>
    <div id="note-list"></div>
</aside>

<main>
    <header>
        <input type="text" id="current-filename" spellcheck="false">
        <div class="controls">
            <div id="g_id_signin"></div>
            <button onclick="exportNote()">Export .md</button>
        </div>
    </header>
    <div class="editor-container">
        <textarea id="editor" spellcheck="false"></textarea>
        <div id="preview"></div>
    </div>
    <div id="status-bar">Ready</div>
</main>

<script>
    const CLIENT_ID = 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const noteListElement = document.getElementById('note-list');
    const status = document.getElementById('status-bar');
    const filenameInput = document.getElementById('current-filename');

    let notes = JSON.parse(localStorage.getItem('asterisk_v5')) || [];
    let activeNoteId = localStorage.getItem('asterisk_active_v5') || null;
    let tokenClient;
    let accessToken = null;

    // --- GOOGLE CLOUD LOGIC ---
    function gapiInit() {
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
        });
    }

    function gisInit() {
        google.accounts.id.initialize({ client_id: CLIENT_ID, callback: (resp) => {
            document.getElementById('g_id_signin').style.display = 'none';
            updateStatus("Cloud Enabled", "var(--success)");
            tokenClient.requestAccessToken({prompt: ''});
        }});
        google.accounts.id.renderButton(document.getElementById("g_id_signin"), { theme: "outline", shape: "pill" });
        
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (tokenResponse) => { accessToken = tokenResponse.access_token; }
        });
    }

    async function syncToDrive() {
        if (!accessToken) return;
        updateStatus("Syncing to Cloud...", "var(--accent)");
        const metadata = { 'name': filenameInput.value + ".md", 'mimeType': 'text/markdown' };
        const file = new Blob([editor.value], {type: 'text/markdown'});
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
        form.append('file', file);

        try {
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
                body: form
            });
            updateStatus("Cloud & Local Saved", "var(--success)");
        } catch (e) { updateStatus("Cloud Sync Error", "var(--danger)"); }
    }

    // --- EDITOR LOGIC ---
    function updateStatus(msg, color = 'var(--text-dim)') {
        status.innerText = msg; status.style.color = color;
    }

    function renderList() {
        noteListElement.innerHTML = '';
        notes.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
            div.onclick = () => switchNote(note.id);
            div.innerHTML = `<span>${note.name || 'Untitled'}</span><span onclick="event.stopPropagation(); deleteNote('${note.id}')">×</span>`;
            noteListElement.appendChild(div);
        });
    }

    function createNewNote() {
        const id = 'n' + Date.now();
        notes.push({ id, name: 'Untitled Note', content: '# New Note' });
        switchNote(id);
    }

    function switchNote(id) {
        activeNoteId = id;
        const note = notes.find(n => n.id === id);
        if (note) {
            editor.value = note.content;
            filenameInput.value = note.name;
            preview.innerHTML = marked.parse(editor.value);
        }
        renderList();
        localStorage.setItem('asterisk_v5', JSON.stringify(notes));
        localStorage.setItem('asterisk_active_v5', activeNoteId);
    }

    // Auto-Save Trigger
    editor.addEventListener('input', () => {
        preview.innerHTML = marked.parse(editor.value);
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            note.content = editor.value;
            updateStatus("Typing...");
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(() => {
                localStorage.setItem('asterisk_v5', JSON.stringify(notes));
                syncToDrive(); // Automatically attempt cloud sync
            }, 1000);
        }
    });

    // Rename Trigger
    filenameInput.addEventListener('input', () => {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            note.name = filenameInput.value;
            renderList();
            localStorage.setItem('asterisk_v5', JSON.stringify(notes));
        }
    });

    function exportNote() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.value], {type: 'text/markdown'}));
        a.download = filenameInput.value + ".md";
        a.click();
    }

    function deleteNote(id) {
        if(!confirm("Delete?")) return;
        notes = notes.filter(n => n.id !== id);
        activeNoteId = notes[0]?.id || null;
        init();
    }

    function init() {
        if (notes.length === 0) createNewNote();
        else switchNote(activeNoteId || notes[0].id);
        gapiInit(); gisInit();
    }

    window.onload = init;
</script>
</body>
</html>

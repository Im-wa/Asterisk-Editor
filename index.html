<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterisk* | Frosted</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <style>
        :root {
            --accent: #58a6ff;
            --text: #ffffff;
            --text-dim: #a3a3a3;
            --glass: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #4ade80;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
            /* A deep, minimal abstract background */
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            color: var(--text);
            overflow: hidden;
        }

        /* --- Minimal Sidebar --- */
        #sidebar {
            width: 240px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; letter-spacing: -1px; font-size: 1.4rem; color: var(--accent); }

        #note-list { flex: 1; padding: 10px; overflow-y: auto; }

        .note-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.03);
        }

        .note-item:hover { background: rgba(255, 255, 255, 0.08); }
        .note-item.active { background: rgba(88, 166, 255, 0.2); border: 1px solid var(--accent); }

        /* --- Main Content --- */
        main { flex: 1; display: flex; flex-direction: column; position: relative; padding: 20px; box-sizing: border-box; }

        header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        input#current-filename {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            width: 300px;
        }

        .controls { display: flex; gap: 15px; align-items: center; }

        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }

        button:hover { background: rgba(255, 255, 255, 0.2); }

        /* --- Editor & Preview Panels --- */
        .workspace {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
        }

        #editor, #preview {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            overflow-y: auto;
            color: var(--text);
            line-height: 1.8;
            font-size: 16px;
        }

        #editor {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            resize: none;
            outline: none;
        }

        #status-bar {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 16px;
            border-radius: 30px;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Markdown Styling */
        #preview h1 { margin-top: 0; font-size: 2.2rem; }
        #preview code { background: rgba(255, 255, 255, 0.1); padding: 3px 6px; border-radius: 6px; font-family: monospace; }
        #preview pre { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid var(--glass-border); overflow-x: auto; }
        #preview blockquote { border-left: 4px solid var(--accent); padding-left: 20px; font-style: italic; color: var(--text-dim); }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">
        <span class="logo">Asterisk*</span>
        <button onclick="createNewNote()" style="padding: 5px 12px;">+</button>
    </div>
    <div id="note-list"></div>
</aside>

<main>
    <header>
        <input type="text" id="current-filename" placeholder="Untitled document" spellcheck="false">
        <div class="controls">
            <div id="g_id_signin"></div>
            <button onclick="exportNote()">Export</button>
            <button onclick="document.getElementById('fileInput').click()">Import</button>
            <input type="file" id="fileInput" accept=".md,.txt">
        </div>
    </header>

    <div class="workspace">
        <textarea id="editor" spellcheck="false" placeholder="Start your masterpiece..."></textarea>
        <div id="preview"></div>
    </div>

    <div id="status-bar">All systems go</div>
</main>

<script>
    const CLIENT_ID = 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const noteListElement = document.getElementById('note-list');
    const status = document.getElementById('status-bar');
    const filenameInput = document.getElementById('current-filename');

    let notes = JSON.parse(localStorage.getItem('asterisk_frosted_v1')) || [];
    let activeNoteId = localStorage.getItem('asterisk_frosted_active') || null;
    let accessToken = null;
    let tokenClient;

    // --- CLOUD LOGIC ---
    function gapiInit() {
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
        });
    }

    function gisInit() {
        google.accounts.id.initialize({ 
            client_id: CLIENT_ID, 
            callback: (resp) => {
                document.getElementById('g_id_signin').style.display = 'none';
                updateStatus("Cloud Connected", "var(--success)");
                tokenClient.requestAccessToken({prompt: ''});
            }
        });
        google.accounts.id.renderButton(document.getElementById("g_id_signin"), { theme: "filled_blue", shape: "pill", size: "medium" });
        
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (resp) => { accessToken = resp.access_token; }
        });
    }

    async function syncToDrive() {
        if (!accessToken) return;
        updateStatus("Syncing...", "var(--accent)");
        const metadata = { 'name': filenameInput.value + ".md", 'mimeType': 'text/markdown' };
        const file = new Blob([editor.value], {type: 'text/markdown'});
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
        form.append('file', file);

        try {
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
                body: form
            });
            updateStatus("Cloud Sync Successful", "var(--success)");
        } catch (e) { updateStatus("Cloud Error", "var(--danger)"); }
    }

    // --- CORE LOGIC ---
    function updateStatus(msg, color = 'var(--text-dim)') {
        status.innerText = msg; status.style.color = color;
    }

    function renderList() {
        noteListElement.innerHTML = '';
        notes.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
            div.onclick = () => switchNote(note.id);
            div.innerHTML = `<span>${note.name}</span><span onclick="event.stopPropagation(); deleteNote('${note.id}')">×</span>`;
            noteListElement.appendChild(div);
        });
    }

    function createNewNote() {
        const id = 'n' + Date.now();
        notes.push({ id, name: 'Untitled Note', content: '# New Note' });
        switchNote(id);
    }

    function switchNote(id) {
        activeNoteId = id;
        const note = notes.find(n => n.id === id);
        if (note) {
            editor.value = note.content;
            filenameInput.value = note.name;
            preview.innerHTML = marked.parse(editor.value);
        }
        renderList();
        saveAll();
    }

    function saveAll() {
        localStorage.setItem('asterisk_frosted_v1', JSON.stringify(notes));
        localStorage.setItem('asterisk_frosted_active', activeNoteId);
    }

    editor.addEventListener('input', () => {
        preview.innerHTML = marked.parse(editor.value);
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            note.content = editor.value;
            updateStatus("Typing...");
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(() => {
                saveAll();
                syncToDrive();
            }, 1200);
        }
    });

    filenameInput.addEventListener('input', () => {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            note.name = filenameInput.value;
            renderList();
            saveAll();
        }
    });

    function exportNote() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.value], {type: 'text/markdown'}));
        a.download = filenameInput.value + ".md";
        a.click();
    }

    function deleteNote(id) {
        if(!confirm("Delete?")) return;
        notes = notes.filter(n => n.id !== id);
        activeNoteId = notes[0]?.id || null;
        init();
    }

    function init() {
        if (notes.length === 0) createNewNote();
        else switchNote(activeNoteId || notes[0].id);
        gapiInit(); gisInit();
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterisk* | Google Sync</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <style>
        :root {
            --bg-sidebar: #010409;
            --bg-main: #0d1117;
            --bg-header: #161b22;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
            --success: #3fb950;
            --danger: #f85149;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; display: flex; height: 100vh;
            background-color: var(--bg-main); color: var(--text-main);
            overflow: hidden;
        }

        /* --- Sidebar --- */
        #sidebar {
            width: 260px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }

        .sidebar-header {
            padding: 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: bold; color: var(--accent); font-size: 1.2rem; }

        #note-list { flex: 1; overflow-y: auto; padding: 10px; }

        .note-item {
            padding: 12px; margin-bottom: 5px; border-radius: 6px;
            cursor: pointer; font-size: 14px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .note-item:hover { background: var(--bg-header); }
        .note-item.active { background: #21262d; border-left: 4px solid var(--accent); }

        .delete-btn { opacity: 0; color: var(--text-dim); transition: 0.2s; font-size: 18px; }
        .note-item:hover .delete-btn { opacity: 1; }

        /* --- Main Editor --- */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }

        header {
            background: var(--bg-header); padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); min-height: 56px;
        }

        .controls { display: flex; gap: 10px; align-items: center; }

        button {
            background: #21262d; color: var(--text-main);
            border: 1px solid var(--border); padding: 7px 14px;
            border-radius: 6px; cursor: pointer; font-size: 12px;
            transition: 0.2s;
        }

        button:hover { background: #30363d; }
        
        #sync-btn { 
            background: transparent; border-color: var(--accent); 
            color: var(--accent); display: none; 
        }

        .editor-container { display: flex; flex: 1; overflow: hidden; }

        #editor, #preview {
            flex: 1; padding: 35px; overflow-y: auto;
            background: var(--bg-main); outline: none; border: none;
            color: var(--text-main); line-height: 1.6; font-size: 15px;
        }

        #editor {
            font-family: 'Fira Code', 'Courier New', monospace;
            border-right: 1px solid var(--border); resize: none;
        }

        #status-bar {
            position: absolute; bottom: 20px; right: 20px;
            font-size: 11px; background: rgba(0,0,0,0.7);
            padding: 5px 15px; border-radius: 20px; color: var(--text-dim);
            pointer-events: none;
        }

        #preview h1 { border-bottom: 1px solid var(--border); padding-bottom: .3em; }
        #preview code { background: rgba(110, 118, 129, 0.4); padding: 2px 4px; border-radius: 6px; }
        #preview pre { background: var(--bg-header); padding: 16px; border-radius: 8px; border: 1px solid var(--border); overflow: auto; }

        #fileInput { display: none; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">
        <span class="logo">Asterisk*</span>
        <button onclick="createNewNote()">+ New</button>
    </div>
    <div id="note-list"></div>
</aside>

<main>
    <header>
        <div id="current-filename">Untitled.md</div>
        <div class="controls">
            <div id="g_id_signin"></div>
            
            <button onclick="requestDriveAccess()" id="sync-btn">Sync to Drive</button>
            <button onclick="document.getElementById('fileInput').click()">Import</button>
            <button onclick="exportNote()">Export .md</button>
            <input type="file" id="fileInput" accept=".md,.txt">
        </div>
    </header>

    <div class="editor-container">
        <textarea id="editor" spellcheck="false" placeholder="Start writing..."></textarea>
        <div id="preview"></div>
    </div>

    <div id="status-bar">Ready</div>
</main>

<script>
    // --- 1. CONFIGURATION ---
    const CLIENT_ID = '542506881392-l9lqh349cd44t2db05dqpcbv58or65u8.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const noteListElement = document.getElementById('note-list');
    const status = document.getElementById('status-bar');
    const filenameDisplay = document.getElementById('current-filename');
    const syncBtn = document.getElementById('sync-btn');
    const signinDiv = document.getElementById('g_id_signin');

    let notes = JSON.parse(localStorage.getItem('asterisk_notes_v4')) || [];
    let activeNoteId = localStorage.getItem('asterisk_active_id_v4') || null;
    let tokenClient;
    let access_token = null;

    // --- 2. GOOGLE IDENTITY SERVICES (GIS) ---

    // Initialize GAPI for Drive operations
    function gapiInit() {
        gapi.load('client', async () => {
            await gapi.client.init({
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            });
        });
    }

    // Initialize the Account Chooser Button
    function gisInit() {
        google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleAuthResponse
        });

        google.accounts.id.renderButton(
            signinDiv,
            { theme: "outline", size: "medium", type: "standard", shape: "pill" }
        );

        // Setup the client for the actual Drive permission (Scope)
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
                if (tokenResponse.access_token) {
                    access_token = tokenResponse.access_token;
                    performUpload();
                }
            },
        });
    }

    function handleAuthResponse(response) {
        // This runs after you pick an account in the Chooser
        updateStatus("Signed in!", "var(--success)");
        signinDiv.style.display = "none";
        syncBtn.style.display = "block";
    }

    function requestDriveAccess() {
        // If we don't have a token, ask for it. Otherwise, just upload.
        if (!access_token) {
            tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            performUpload();
        }
    }

    async function performUpload() {
        updateStatus("Uploading to Drive...", "var(--accent)");
        
        const metadata = {
            'name': filenameDisplay.innerText,
            'mimeType': 'text/markdown'
        };

        const file = new Blob([editor.value], {type: 'text/markdown'});
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
        form.append('file', file);

        try {
            const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({'Authorization': 'Bearer ' + access_token}),
                body: form
            });
            if (resp.ok) updateStatus("Synced to Cloud", "var(--success)");
            else throw new Error();
        } catch (e) {
            updateStatus("Sync Failed", "var(--danger)");
            access_token = null; // Reset token if it expired
        }
    }

    // --- 3. EDITOR LOGIC ---

    function updateStatus(msg, color = 'var(--text-dim)') {
        status.innerText = msg;
        status.style.color = color;
    }

    function save() {
        localStorage.setItem('asterisk_notes_v4', JSON.stringify(notes));
        localStorage.setItem('asterisk_active_id_v4', activeNoteId);
    }

    function renderList() {
        noteListElement.innerHTML = '';
        notes.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
            div.onclick = () => switchNote(note.id);
            const title = note.content.split('\n')[0].replace(/[#*]/g, '').trim() || "Untitled";
            div.innerHTML = `<span>${title.substring(0, 18)}</span><span class="delete-btn" onclick="event.stopPropagation(); deleteNote('${note.id}')">×</span>`;
            noteListElement.appendChild(div);
        });
    }

    function createNewNote(content = "# New Note\nWrite here...") {
        const id = 'note_' + Date.now();
        notes.push({ id, content });
        switchNote(id);
    }

    function switchNote(id) {
        activeNoteId = id;
        const note = notes.find(n => n.id === id);
        if (note) {
            editor.value = note.content;
            const title = note.content.split('\n')[0].replace(/[#*]/g, '').trim() || "Untitled";
            filenameDisplay.innerText = title + ".md";
            preview.innerHTML = marked.parse(editor.value);
        }
        renderList();
        save();
    }

    editor.addEventListener('input', () => {
        preview.innerHTML = marked.parse(editor.value);
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            note.content = editor.value;
            save();
            // Debounce the list update so it's not laggy
            clearTimeout(window.listTimer);
            window.listTimer = setTimeout(renderList, 500);
            updateStatus("Autosaving...", "var(--accent)");
        }
    });

    function exportNote() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.value], {type: 'text/markdown'}));
        a.download = filenameDisplay.innerText;
        a.click();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => createNewNote(ev.target.result);
        reader.readAsText(e.target.files[0]);
    });

    function deleteNote(id) {
        if(!confirm("Delete this note?")) return;
        notes = notes.filter(n => n.id !== id);
        activeNoteId = notes[0]?.id || null;
        init();
    }

    function init() {
        if (notes.length === 0) createNewNote();
        else switchNote(activeNoteId || notes[0].id);
        gapiInit();
        gisInit();
    }

    window.onload = init;
</script>

</body>
</html>

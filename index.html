<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterisk* | Markdown edito</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <style>
        :root {
            --accent: #a8d5ba;
            --text: #ffffff;
            --text-dim: #d1d1d1;
            --glass: rgba(15, 20, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --success: #81c784;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
            background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2560&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            display: flex; color: var(--text); overflow: hidden;
        }

        /* --- Sidebar --- */
        #sidebar {
            width: 220px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
        }

        .sidebar-header { padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.3rem; color: var(--accent); }

        #note-list { flex: 1; padding: 10px; overflow-y: auto; }
        .note-item {
            padding: 12px; margin-bottom: 8px; border-radius: 10px;
            cursor: pointer; transition: 0.2s; display: flex;
            justify-content: space-between; font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
        }
        .note-item:hover { background: rgba(255, 255, 255, 0.1); }
        .note-item.active { background: rgba(168, 213, 186, 0.2); border: 1px solid var(--accent); }

        /* --- Main Content --- */
        main { flex: 1; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; }

        header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 25px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }

        #current-filename {
            background: transparent; border: none; color: white;
            font-size: 18px; font-weight: 600; outline: none; width: 40%;
        }

        .controls { display: flex; gap: 10px; align-items: center; }
        button {
            background: rgba(255, 255, 255, 0.1); color: white;
            border: 1px solid var(--glass-border); padding: 8px 14px;
            border-radius: 8px; cursor: pointer; font-size: 12px;
            backdrop-filter: blur(5px); transition: 0.2s;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); }

        /* --- Singular Panel Editor --- */
        .panel-container {
            flex: 1; position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; display: flex;
            overflow: hidden;
        }

        #editor {
            flex: 1; background: transparent; border: none;
            padding: 40px; color: var(--text); font-size: 17px;
            line-height: 1.8; outline: none; resize: none;
            font-family: 'Inter', sans-serif;
        }

        #preview-overlay {
            display: none; position: absolute; top:0; left:0; right:0; bottom:0;
            background: var(--glass); padding: 40px; overflow-y: auto; z-index: 5;
        }

        /* --- Cloud Modal --- */
        #cloud-modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 400px; max-height: 500px;
            background: rgba(10, 15, 10, 0.9); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            z-index: 100; padding: 25px; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #cloud-modal h3 { margin-top: 0; color: var(--accent); }
        #cloud-file-list { flex: 1; overflow-y: auto; margin: 15px 0; }
        .cloud-item {
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .cloud-item:hover { color: var(--accent); padding-left: 15px; }

        #status-bar {
            position: absolute; bottom: 30px; right: 30px;
            font-size: 10px; color: var(--text-dim);
            letter-spacing: 1.5px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="cloud-modal">
    <h3>Google Drive Files</h3>
    <div id="cloud-file-list">Scanning...</div>
    <button onclick="closeCloudModal()">Close</button>
</div>

<aside id="sidebar">
    <div class="sidebar-header">
        <span class="logo">Asterisk*</span>
        <button onclick="createNewNote()">+</button>
    </div>
    <div id="note-list"></div>
</aside>

<main>
    <header>
        <input type="text" id="current-filename" placeholder="Untitled document" spellcheck="false">
        <div class="controls">
            <div id="g_id_signin"></div>
            <button id="browse-drive-btn" style="display:none;" onclick="openCloudModal()">Browse Drive</button>
            <button onclick="togglePreview()" id="preview-toggle">Preview</button>
            <button onclick="exportNote()">Export</button>
        </div>
    </header>

    <div class="panel-container">
        <textarea id="editor" spellcheck="false" placeholder="Your mind, meeting the nature..."></textarea>
        <div id="preview-overlay"></div>
        <div id="status-bar">Offline Mode</div>
    </div>
</main>

<script>
    // --- CLIENT ID ---
    const CLIENT_ID = '542506881392-l9lqh349cd44t2db05dqpcbv58or65u8.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.file';

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview-overlay');
    const noteListElement = document.getElementById('note-list');
    const status = document.getElementById('status-bar');
    const filenameInput = document.getElementById('current-filename');
    const cloudModal = document.getElementById('cloud-modal');
    const cloudFileList = document.getElementById('cloud-file-list');

    let notes = JSON.parse(localStorage.getItem('asterisk_nature_v2')) || [];
    let activeNoteId = localStorage.getItem('asterisk_nature_active') || null;
    let accessToken = null;
    let isPreviewMode = false;

    // --- GOOGLE API INIT ---
    function gapiInit() {
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
        });
    }

    function gisInit() {
        google.accounts.id.initialize({ 
            client_id: CLIENT_ID, 
            callback: (resp) => {
                document.getElementById('g_id_signin').style.display = 'none';
                document.getElementById('browse-drive-btn').style.display = 'block';
                updateStatus("Connected", "var(--success)");
                tokenClient.requestAccessToken({prompt: ''});
            }
        });
        google.accounts.id.renderButton(document.getElementById("g_id_signin"), { theme: "outline", shape: "pill" });
        
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (resp) => { accessToken = resp.access_token; }
        });
    }

    // --- DRIVE SCANNING & IMPORT ---
    async function openCloudModal() {
        cloudModal.style.display = 'flex';
        cloudFileList.innerHTML = "Scanning Drive...";
        
        try {
            const response = await fetch("https://www.googleapis.com/drive/v3/files?q=name contains '.md' or name contains '.txt'&fields=files(id, name)", {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            const data = await response.json();
            
            if (data.files && data.files.length > 0) {
                cloudFileList.innerHTML = "";
                data.files.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'cloud-item';
                    div.innerText = file.name;
                    div.onclick = () => importFromDrive(file.id, file.name);
                    cloudFileList.appendChild(div);
                });
            } else {
                cloudFileList.innerHTML = "No Markdown files found.";
            }
        } catch (e) { cloudFileList.innerHTML = "Error scanning Drive."; }
    }

    async function importFromDrive(fileId, fileName) {
        updateStatus("Importing...");
        try {
            const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            const content = await response.text();
            
            // Add to our local notes
            const id = 'n' + Date.now();
            notes.push({ id, name: fileName.replace('.md',''), content: content });
            closeCloudModal();
            switchNote(id);
            updateStatus("Imported!", "var(--success)");
        } catch (e) { updateStatus("Import Failed", "var(--danger)"); }
    }

    function closeCloudModal() { cloudModal.style.display = 'none'; }

    // --- APP CORE ---
    function updateStatus(msg, color = 'var(--text-dim)') {
        status.innerText = msg; status.style.color = color;
    }

    function togglePreview() {
        isPreviewMode = !isPreviewMode;
        if (isPreviewMode) {
            preview.innerHTML = marked.parse(editor.value);
            preview.style.display = 'block';
            document.getElementById('preview-toggle').innerText = "Edit";
        } else {
            preview.style.display = 'none';
            document.getElementById('preview-toggle').innerText = "Preview";
        }
    }

    function renderList() {
        noteListElement.innerHTML = '';
        notes.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
            div.onclick = () => switchNote(note.id);
            div.innerHTML = `<span>${note.name}</span><span onclick="event.stopPropagation(); deleteNote('${note.id}')">×</span>`;
            noteListElement.appendChild(div);
        });
    }

    function createNewNote() {
        const id = 'n' + Date.now();
        notes.push({ id, name: 'Untitled Note', content: '# New Note' });
        switchNote(id);
    }

    function switchNote(id) {
        activeNoteId = id;
        const note = notes.find(n => n.id === id);
        if (note) {
            editor.value = note.content;
            filenameInput.value = note.name;
        }
        renderList();
        save();
    }

    function save() {
        localStorage.setItem('asterisk_nature_v2', JSON.stringify(notes));
        localStorage.setItem('asterisk_nature_active', activeNoteId);
    }

    editor.addEventListener('input', () => {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            note.content = editor.value;
            updateStatus("Typing...");
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(() => {
                save();
                // Simple cloud backup of current file
                if(accessToken) {
                    // (Previous sync logic can be added here)
                }
            }, 1500);
        }
    });

    filenameInput.addEventListener('input', () => {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) { note.name = filenameInput.value; renderList(); save(); }
    });

    function exportNote() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.value], {type: 'text/markdown'}));
        a.download = filenameInput.value + ".md";
        a.click();
    }

    function deleteNote(id) {
        if(!confirm("Delete?")) return;
        notes = notes.filter(n => n.id !== id);
        activeNoteId = notes[0]?.id || null;
        init();
    }

    function init() {
        if (notes.length === 0) createNewNote();
        else switchNote(activeNoteId || notes[0].id);
        gapiInit(); gisInit();
    }

    window.onload = init;
</script>
</body>
</html>
